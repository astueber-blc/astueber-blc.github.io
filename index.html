<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline Fever</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #f5d76e;
      font-family: Arial, sans-serif;
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #0d0d0d;
      border: 1px solid rgba(245, 215, 110, 0.25);
      border-radius: 24px;
      padding: 60px 50px;
      box-shadow: 0 0 40px rgba(245, 215, 110, 0.08);

      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 3.5rem;
      letter-spacing: 4px;
      color: #f5d76e;
    }

    .subtitle {
      margin-top: 18px;
      margin-bottom: 50px;

      color: #c7b26a;
      font-size: 1.1rem;
      line-height: 1.7;
    }

    /* IMPORTANT */
    /* Do NOT style inputs, buttons, forms globally */
    /* This prevents overriding Pipedrive styles */

    .form-container {
      margin-top: 20px;
      background: transparent;

      display: flex;
      justify-content: center;
    }

    .footer {
      margin-top: 45px;
      color: #666;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .card {
        padding: 40px 22px;
      }

      h1 {
        font-size: 2.4rem;
      }

      .subtitle {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>PIPELINE FEVER</h1>

      <div class="subtitle">
        Automations. Pipelines. Growth.<br>
        Contact us instantly through the form below or chat with us directly.
      </div>

      <!-- Pipedrive Web Form -->
      <div class="form-container">

        <div
          class="pipedriveWebForms"
          data-pd-webforms="https://webforms.pipedrive.com/f/6W6L0Q5Fyz34LONdMAP6fbNyvfUlbg5poDe4FWZzC6wBNaaBxLrVLWBZGqpOoHTD3B">
          <script src="https://webforms.pipedrive.com/f/loader"></script>
        </div>

      </div>

      <div class="footer">
        © 2026 Pipeline Fever
      </div>

    </div>

  </div>

  <!-- Pipedrive Chatbot -->
  <script>
    window.pipedriveLeadboosterConfig = {
      base: 'leadbooster-chat.pipedrive.com',
      companyId: 10306856,
      playbookUuid: '1adfc43e-b9fc-48e2-b3fe-c81631298151',
      version: 2
    };

    (function () {
      var w = window;

      if (w.LeadBooster) {
        console.warn('LeadBooster already exists');
      } else {
        w.LeadBooster = {
          q: [],
          on: function (n, h) {
            this.q.push({ t: 'o', n: n, h: h });
          },
          trigger: function (n) {
            this.q.push({ t: 't', n: n });
          },
        };
      }
    })();
  </script>

  <script
    src="https://leadbooster-chat.pipedrive.com/assets/loader.js"
    async>
  </script>

</body>
</html>
