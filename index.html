<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline Fever</title>

  <style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    background: #000;
    font-family: Arial, sans-serif;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 950px;
  }

  .card {
    background: #0d0d0d;
    border: 1px solid rgba(245, 215, 110, 0.25);
    border-radius: 24px;
    padding: 60px 50px;
    text-align: center;

    box-shadow: 0 0 40px rgba(245, 215, 110, 0.08);
  }

  h1 {
    margin: 0;
    color: #f5d76e;
    font-size: 4rem;
    letter-spacing: 4px;
  }

  .subtitle {
    margin-top: 20px;
    margin-bottom: 50px;

    color: #d6bf6a;
    font-size: 1.2rem;
    line-height: 1.7;
  }

  /* FORM CONTAINER */
  .form-box {
    background: #ffffff;
    border-radius: 18px;
    padding: 24px;

    max-width: 720px;
    margin: 0 auto;

    text-align: left;
  }

  /* IMPORTANT FIX */
  /* Reset inherited styles INSIDE pipedrive form */

  .pipedriveWebForms,
  .pipedriveWebForms * {
    color: initial !important;
    font-family: initial !important;
  }

  .footer {
    margin-top: 40px;
    color: #777;
    font-size: 0.9rem;
  }

  @media (max-width: 768px) {
    .card {
      padding: 35px 20px;
    }

    h1 {
      font-size: 2.5rem;
    }

    .subtitle {
      font-size: 1rem;
    }

    .form-box {
      padding: 14px;
    }
  }
</style>
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>PIPELINE FEVER</h1>

      <div class="subtitle">
        Simple. Elegant. Effective.<br>
        Contact us instantly through the form below or chat with us directly.
      </div>
<!-- HERO IMAGE -->
<img
  src="https://blc-conseil.com/wp-content/uploads/2023/03/Pipedrive-elite-partner.png.webp?q=80&w=1600&auto=format&fit=crop"
  alt="Pipeline Fever"
  class="hero-image"
/>
      .hero-image {
  width: 100%;
  max-width: 460px;

  height: auto;

  display: block;

  margin: 0 auto 35px auto;

  object-fit: contain;

  border-radius: 18px;
}
      <!-- FORM -->
      <div class="form-box">

        <div
          class="pipedriveWebForms"
          data-pd-webforms="https://webforms.pipedrive.com/f/6W6L0Q5Fyz34LONdMAP6fbNyvfUlbg5poDe4FWZzC6wBNaaBxLrVLWBZGqpOoHTD3B">
          <script src="https://webforms.pipedrive.com/f/loader"></script>
        </div>

      </div>

      <div class="footer">
        © 2026 Pipeline Fever
      </div>

    </div>

  </div>

  <!-- CHATBOT -->
  <script>
    window.pipedriveLeadboosterConfig = {
      base: 'leadbooster-chat.pipedrive.com',
      companyId: 10306856,
      playbookUuid: '1adfc43e-b9fc-48e2-b3fe-c81631298151',
      version: 2
    };

    (function () {
      var w = window;

      if (w.LeadBooster) {
        console.warn('LeadBooster already exists');
      } else {
        w.LeadBooster = {
          q: [],
          on: function (n, h) {
            this.q.push({ t: 'o', n: n, h: h });
          },
          trigger: function (n) {
            this.q.push({ t: 't', n: n });
          },
        };
      }
    })();
  </script>

  <script
    src="https://leadbooster-chat.pipedrive.com/assets/loader.js"
    async>
  </script>

</body>
</html>
