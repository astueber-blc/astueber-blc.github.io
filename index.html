<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astueber</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #f5d76e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      letter-spacing: 3px;
    }

    p {
      color: #d4c27a;
      margin-bottom: 40px;
      line-height: 1.6;
      font-size: 1.1rem;
    }

    .card {
      background: #111;
      border: 1px solid #f5d76e;
      border-radius: 18px;
      padding: 40px;
      box-shadow: 0 0 35px rgba(245, 215, 110, 0.12);
    }

    .form-wrapper {
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      padding: 10px;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: #777;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }

      .card {
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>PIPELINE FEVER</h1>

      <p>
        Simple. Elegant. Effective.<br>
        Contact us instantly through the form below or chat with us directly.
      </p>

      <!-- Pipedrive Web Form -->
      <div class="form-wrapper">
        <div class="pipedriveWebForms"
          data-pd-webforms="https://webforms.pipedrive.com/f/6W6L0Q5Fyz34LONdMAP6fbNyvfUlbg5poDe4FWZzC6wBNaaBxLrVLWBZGqpOoHTD3B">
          <script src="https://webforms.pipedrive.com/f/loader"></script>
        </div>
      </div>

      <div class="footer">
        © 2026 Astueber
      </div>

    </div>
  </div>

  <!-- Pipedrive Chatbot -->
  <script>
    window.pipedriveLeadboosterConfig = {
      base: 'leadbooster-chat.pipedrive.com',
      companyId: 10306856,
      playbookUuid: '1adfc43e-b9fc-48e2-b3fe-c81631298151',
      version: 2
    };

    (function () {
      var w = window;
      if (w.LeadBooster) {
        console.warn('LeadBooster already exists');
      } else {
        w.LeadBooster = {
          q: [],
          on: function (n, h) {
            this.q.push({ t: 'o', n: n, h: h });
          },
          trigger: function (n) {
            this.q.push({ t: 't', n: n });
          },
        };
      }
    })();
  </script>

  <script
    src="https://leadbooster-chat.pipedrive.com/assets/loader.js"
    async>
  </script>

</body>
</html>
