<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astueber</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #f5d76e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    p {
      color: #d4c27a;
      margin-bottom: 40px;
      line-height: 1.6;
      font-size: 1.1rem;
    }

    .card {
      background: #111;
      border: 1px solid #f5d76e;
      border-radius: 16px;
      padding: 35px;
      box-shadow: 0 0 30px rgba(245, 215, 110, 0.15);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #000;
      color: white;
      font-size: 1rem;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #f5d76e;
    }

    button {
      background: #f5d76e;
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #ffe38a;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: #777;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.2rem;
      }

      .card {
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>ASTUEBER</h1>

      <p>
        Simple. Elegant. Effective.<br>
        Contact us directly using the form below or chat with us instantly.
      </p>

      <form action="#" method="POST">
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <textarea name="message" rows="5" placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
      </form>

      <div class="footer">
        © 2026 Astueber
      </div>
    </div>
  </div>

  <!-- Pipedrive Chatbot -->
  <script>
    window.pipedriveLeadboosterConfig = {
      base: 'leadbooster-chat.pipedrive.com',
      companyId: 10306856,
      playbookUuid: '1adfc43e-b9fc-48e2-b3fe-c81631298151',
      version: 2
    };

    (function () {
      var w = window;
      if (w.LeadBooster) {
        console.warn('LeadBooster already exists');
      } else {
        w.LeadBooster = {
          q: [],
          on: function (n, h) {
            this.q.push({ t: 'o', n: n, h: h });
          },
          trigger: function (n) {
            this.q.push({ t: 't', n: n });
          },
        };
      }
    })();
  </script>

  <script
    src="https://leadbooster-chat.pipedrive.com/assets/loader.js"
    async
  ></script>

</body>
</html>
